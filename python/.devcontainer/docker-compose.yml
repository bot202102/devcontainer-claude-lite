# =============================================================================
# Docker Compose for multi-service development (Python)
# =============================================================================
# Usage:
#   1. Uncomment the services you need
#   2. In devcontainer.json, switch from "build" to "dockerComposeFile" mode:
#        "dockerComposeFile": "docker-compose.yml",
#        "service": "app",
#        "shutdownAction": "stopCompose"
#   3. Rebuild the container
#
# Or use standalone (without devcontainer integration):
#   docker compose -f .devcontainer/docker-compose.yml up -d
#
# IMPORTANT: requirements.txt is installed at build time (in the Dockerfile)
# so ALL services (app, workers, etc.) get the Python dependencies.
# postCreateCommand re-runs pip install for dev updates on the main service.
# =============================================================================

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        TZ: ${TZ:-America/Lima}
        CLAUDE_CODE_VERSION: latest
    volumes:
      - ..:/workspace:cached
      - claude-lite-history:/commandhistory
      - claude-lite-config:/home/dev/.claude
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
