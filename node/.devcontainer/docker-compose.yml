# =============================================================================
# Docker Compose for multi-service development
# =============================================================================
# Usage:
#   1. Uncomment the services you need
#   2. In devcontainer.json, switch from "build" to "dockerComposeFile" mode:
#        "dockerComposeFile": "docker-compose.yml",
#        "service": "app",
#        "shutdownAction": "stopCompose"
#   3. Rebuild the container
#
# Or use standalone (without devcontainer integration):
#   docker compose -f .devcontainer/docker-compose.yml up -d
#
# PORT CONFLICTS: If you run multiple devcontainers simultaneously, use unique
# port ranges per project via env vars. Example in .env:
#   POSTGRES_PORT=31432
#   REDIS_PORT=31379
# Default ports (5432, 6379, etc.) WILL conflict with other containers and can
# cause silent network failures (container starts but has no internet).
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-America/Lima}
        CLAUDE_CODE_VERSION: latest
    volumes:
      - ..:/workspace:cached
      - claude-lite-history:/commandhistory
      - claude-lite-config:/home/node/.claude
      - claude-lite-node-modules:/workspace/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    # Detect network loss early (port conflicts cause silent disconnects)
    healthcheck:
      test: ["CMD-SHELL", "getent hosts google.com > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
